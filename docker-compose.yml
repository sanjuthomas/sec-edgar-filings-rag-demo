# SEC EDGAR filings → pgvector + Qdrant → semantic search RAG demo
#
# Orchestrates published images only — no application source in this repo.
#
# Set host data directories in .env (or pass env vars when starting):
#   EDGAR_HOST_PATH, MONGO_HOST_PATH, KAFKA_HOST_PATH, PGVECTOR_HOST_PATH, QDRANT_HOST_PATH
#
# Prerequisites:
#   - Ollama running on the host (http://localhost:11434)
#   - SEC_USER_AGENT set in .env
#
# Start the full stack:
#   docker compose up -d
#
# Include Kafka debug UI (host port 18081):
#   docker compose --profile debug up -d
#
# Host ports (all > 10000): mongo 10017, kafka 10092, pgvector 10432, qdrant 16333/16334,
#   filings crawler 18080, pgvector search UI 18000, qdrant search UI 18002, RAG UI 18095,
#   kafka debug 18081

services:
  init-dirs:
    image: alpine:3.21
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /edgar /mongo /kafka /pgvector /qdrant"]
    volumes:
      - ${EDGAR_HOST_PATH:-./sec-edgar/filings-data}:/edgar
      - ${MONGO_HOST_PATH:-./sec-edgar/mongo-data}:/mongo
      - ${KAFKA_HOST_PATH:-./sec-edgar/kafka-data}:/kafka
      - ${PGVECTOR_HOST_PATH:-./sec-edgar/pgvector-data}:/pgvector
      - ${QDRANT_HOST_PATH:-./sec-edgar/qdrant-data}:/qdrant

  # --- 1. sec-edgar-filings-crawler (producer: MongoDB + Kafka + downloader API) ---

  mongo:
    image: mongo:7
    restart: unless-stopped
    depends_on:
      init-dirs:
        condition: service_completed_successfully
    ports:
      - "10017:27017"
    volumes:
      - ${MONGO_HOST_PATH:-./sec-edgar/mongo-data}:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: apache/kafka:3.9.0
    restart: unless-stopped
    depends_on:
      init-dirs:
        condition: service_completed_successfully
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - ${KAFKA_HOST_PATH:-./sec-edgar/kafka-data}:/tmp/kraft-combined-logs
    ports:
      - "10092:9092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  sec-edgar-filings-crawler:
    image: sanjuthomas/sec-edgar-filings-crawler:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SEC_USER_AGENT: "${SEC_USER_AGENT:-thomas.sanju@gmail.com}"
      WIKIPEDIA_USER_AGENT: "${WIKIPEDIA_USER_AGENT:-${SEC_USER_AGENT:-thomas.sanju@gmail.com}}"
      MONGO_URI: mongodb://mongo:27017
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: "true"
      EDGAR_DOWNLOAD_BASE: /data/edgar
    volumes:
      - ${EDGAR_HOST_PATH:-./sec-edgar/filings-data}:/data/edgar
    ports:
      - "18080:8080"
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- 2. sec-edgar-filings-to-pgvector (pgvector + Kafka consumer / ETL) ---

  pgvector:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    depends_on:
      init-dirs:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edgar
    ports:
      - "10432:5432"
    volumes:
      - ${PGVECTOR_HOST_PATH:-./sec-edgar/pgvector-data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edgar"]
      interval: 5s
      timeout: 5s
      retries: 5

  init-kafka:
    image: apache/kafka:3.9.0
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      [
        "/opt/kafka/bin/kafka-topics.sh",
        "--bootstrap-server",
        "kafka:9092",
        "--create",
        "--if-not-exists",
        "--topic",
        "filings",
        "--partitions",
        "1",
        "--replication-factor",
        "1",
      ]

  init-db:
    image: pgvector/pgvector:pg17
    restart: "no"
    depends_on:
      pgvector:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./sql/001_init.sql:/init.sql:ro
    entrypoint:
      [
        "psql",
        "-h",
        "pgvector",
        "-U",
        "postgres",
        "-d",
        "edgar",
        "-v",
        "ON_ERROR_STOP=1",
        "-f",
        "/init.sql",
      ]

  sec-edgar-filings-to-pgvector:
    image: sanjuthomas/sec-edgar-filings-to-pgvector:latest
    restart: unless-stopped
    cpus: 8
    mem_reservation: 2g
    mem_limit: 4g
    depends_on:
      init-db:
        condition: service_completed_successfully
      init-kafka:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgvector:5432/edgar
      EDGAR_DATA_DIR: /data/edgar
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: sec_edgar_filings
      MONGO_FILING_METADATA_COLLECTION: filing_metadata
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: filings
      KAFKA_GROUP_ID: edgar-pgvector-etl
      KAFKA_AUTO_OFFSET_RESET: earliest
      KAFKA_SESSION_TIMEOUT_MS: "180000"
      ALLOWED_FORMS: '["10-K","10-Q","10-K/A","10-Q/A","8-K","8-K/A"]'
    volumes:
      - ${EDGAR_HOST_PATH:-./sec-edgar/filings-data}:/data/edgar:ro

  sec-edgar-filings-to-pgvector-search:
    image: sanjuthomas/sec-edgar-filings-to-pgvector:latest
    restart: unless-stopped
    depends_on:
      init-db:
        condition: service_completed_successfully
      pgvector:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgvector:5432/edgar
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      LOG_LEVEL: INFO
    ports:
      - "18000:8000"
    command: ["edgar-etl", "serve", "--host", "0.0.0.0", "--port", "8000"]

  # --- 3. sec-edgar-filings-to-qdrant (Qdrant + Kafka consumer / ETL) ---

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    depends_on:
      init-dirs:
        condition: service_completed_successfully
    ports:
      - "16333:6333"
      - "16334:6334"
    volumes:
      - ${QDRANT_HOST_PATH:-./sec-edgar/qdrant-data}:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333' || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  init-qdrant:
    image: sanjuthomas/sec-edgar-filings-to-qdrant:latest
    restart: "no"
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: filing_chunks
    entrypoint: ["edgar-etl", "init-collection"]

  sec-edgar-filings-to-qdrant:
    image: sanjuthomas/sec-edgar-filings-to-qdrant:latest
    restart: unless-stopped
    cpus: 8
    mem_reservation: 2g
    mem_limit: 4g
    depends_on:
      init-qdrant:
        condition: service_completed_successfully
      init-kafka:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: filing_chunks
      EDGAR_DATA_DIR: /data/edgar
      ALLOWED_FORMS: '["10-K","10-Q","10-K/A","10-Q/A","8-K","8-K/A"]'
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: filings
      KAFKA_GROUP_ID: edgar-qdrant-etl
      KAFKA_AUTO_OFFSET_RESET: earliest
      KAFKA_SESSION_TIMEOUT_MS: "180000"
    volumes:
      - ${EDGAR_HOST_PATH:-./sec-edgar/filings-data}:/data/edgar:ro

  sec-edgar-filings-to-qdrant-search:
    image: sanjuthomas/sec-edgar-filings-to-qdrant:latest
    restart: unless-stopped
    depends_on:
      init-qdrant:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: filing_chunks
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      LOG_LEVEL: INFO
    ports:
      - "18002:8000"
    command: ["edgar-etl", "serve", "--host", "0.0.0.0", "--port", "8000"]

  # --- 4. semantic search UI (pgvector or Qdrant + Ollama on host) ---

  sec-edgar-filings-semantic-search-ui:
    image: sanjuthomas/sec-edgar-filings-semantic-search-ui:latest
    restart: unless-stopped
    ports:
      - "18095:8095"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://pgvector:5432/edgar
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434
      APP_VECTORSTORES_DEFAULT_VECTOR_STORE: pgvector
      APP_VECTORSTORES_QDRANT_URL: http://qdrant:6333
      APP_VECTORSTORES_QDRANT_COLLECTION: filing_chunks
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      init-db:
        condition: service_completed_successfully
      init-qdrant:
        condition: service_completed_successfully
      pgvector:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # --- 5. Kafka debug UI (optional) ---

  kafka-web-clients:
    profiles: ["debug"]
    image: sanjuthomas/kafka-web-clients:latest
    restart: unless-stopped
    ports:
      - "18081:8080"
    depends_on:
      kafka:
        condition: service_healthy
