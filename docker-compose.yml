# SEC EDGAR filings → pgvector + Qdrant → chat RAG demo
#
# Orchestrates published images only — no application source in this repo.
#
# Set host data directories in .env (or pass env vars when starting):
#   EDGAR_HOST_PATH, MONGO_HOST_PATH, KAFKA_HOST_PATH, PGVECTOR_HOST_PATH, QDRANT_HOST_PATH,
#   HF_CACHE_HOST_PATH, CONFIG_HOST_PATH
#
# Prerequisites:
#   - Ollama running on the host (http://localhost:11434) with bge-m3 pulled
#   - SEC_USER_AGENT set in .env
#
# Start the full stack (both vector pipelines + chat UI):
#   docker compose up -d
#   # or explicitly: docker compose --profile pgvector --profile qdrant --profile rag up -d
#
# Start one pipeline only (no chat UI — it needs both vector stores):
#   docker compose --profile pgvector up -d
#   docker compose --profile qdrant up -d
#
# Include Kafka debug UI (host port 18081):
#   docker compose --profile debug up -d
#
# Host ports (all > 10000): mongo 10017, kafka 10092, pgvector 10432, qdrant 16333/16334,
#   filings crawler 18080, pgvector search 18000, pgvector ETL admin 18001, qdrant search 18002,
#   qdrant ETL admin 18003, chat UI 18095, kafka debug 18081

x-embedding-env: &embedding-env
  EMBEDDING_MODEL: BAAI/bge-m3
  EMBEDDING_BACKEND: embedded
  EMBEDDING_CONFIG_PATH: /app/config/embedding-backend.json
  OLLAMA_BASE_URL: http://host.docker.internal:11434
  OLLAMA_EMBEDDING_MODEL: bge-m3
  EMBEDDING_DEVICE: cpu
  EMBEDDING_MAX_SEQ_LENGTH: 512
  EMBEDDING_BATCH_SIZE: 16
  LOG_LEVEL: INFO

services:
  init-dirs:
    image: alpine:3.21
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /edgar /mongo /kafka /pgvector /qdrant /hf-cache /config"]
    volumes:
      - ${EDGAR_HOST_PATH:-./sec-edgar/filings-data}:/edgar
      - ${MONGO_HOST_PATH:-./sec-edgar/mongo-data}:/mongo
      - ${KAFKA_HOST_PATH:-./sec-edgar/kafka-data}:/kafka
      - ${PGVECTOR_HOST_PATH:-./sec-edgar/pgvector-data}:/pgvector
      - ${QDRANT_HOST_PATH:-./sec-edgar/qdrant-data}:/qdrant
      - ${HF_CACHE_HOST_PATH:-./sec-edgar/hf-cache}:/hf-cache
      - ${CONFIG_HOST_PATH:-./config}:/config

  # --- 1. sec-edgar-filings-crawler (producer: MongoDB + Kafka + downloader API) ---

  mongo:
    image: mongo:7
    restart: unless-stopped
    depends_on:
      init-dirs:
        condition: service_completed_successfully
    ports:
      - "10017:27017"
    volumes:
      - ${MONGO_HOST_PATH:-./sec-edgar/mongo-data}:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: apache/kafka:3.9.0
    restart: unless-stopped
    depends_on:
      init-dirs:
        condition: service_completed_successfully
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - ${KAFKA_HOST_PATH:-./sec-edgar/kafka-data}:/tmp/kraft-combined-logs
    ports:
      - "10092:9092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  sec-edgar-filings-crawler:
    image: sanjuthomas/sec-edgar-filings-crawler:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SEC_USER_AGENT: "${SEC_USER_AGENT:-thomas.sanju@gmail.com}"
      WIKIPEDIA_USER_AGENT: "${WIKIPEDIA_USER_AGENT:-${SEC_USER_AGENT:-thomas.sanju@gmail.com}}"
      MONGO_URI: mongodb://mongo:27017
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: "true"
      EDGAR_DOWNLOAD_BASE: /data/edgar
    volumes:
      - ${EDGAR_HOST_PATH:-./sec-edgar/filings-data}:/data/edgar
    ports:
      - "18080:8080"
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- 2. pgvector pipeline (ParadeDB, init, ETL standby, search — separate containers) ---

  pgvector:
    profiles: ["pgvector"]
    image: paradedb/paradedb:latest-pg17
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/pgvector-entrypoint.sh"]
    command: ["postgres"]
    depends_on:
      init-dirs:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edgar
    ports:
      - "10432:5432"
    volumes:
      - ${PGVECTOR_HOST_PATH:-./sec-edgar/pgvector-data}:/var/lib/postgresql/data
      - ./scripts/pgvector-entrypoint.sh:/pgvector-entrypoint.sh:ro
      - ./sql/001_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edgar"]
      interval: 5s
      timeout: 5s
      retries: 5

  init-kafka:
    image: apache/kafka:3.9.0
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      [
        "/opt/kafka/bin/kafka-topics.sh",
        "--bootstrap-server",
        "kafka:9092",
        "--create",
        "--if-not-exists",
        "--topic",
        "filings",
        "--partitions",
        "1",
        "--replication-factor",
        "1",
      ]

  pgvector-init:
    profiles: ["pgvector"]
    image: paradedb/paradedb:latest-pg17
    restart: "no"
    depends_on:
      pgvector:
        condition: service_healthy
    environment:
      PGHOST: pgvector
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: edgar
    volumes:
      - ./sql:/sql:ro
      - ./scripts/pgvector-init.sh:/pgvector-init.sh:ro
    entrypoint: ["/bin/sh", "/pgvector-init.sh"]

  sec-edgar-filings-to-pgvector:
    profiles: ["pgvector"]
    image: sanjuthomas/sec-edgar-filings-to-pgvector:latest
    restart: unless-stopped
    cpus: 4
    mem_reservation: 2g
    mem_limit: 32g
    memswap_limit: 32g
    depends_on:
      pgvector-init:
        condition: service_completed_successfully
      init-kafka:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    environment:
      <<: *embedding-env
      DATABASE_URL: postgresql://postgres:postgres@pgvector:5432/edgar
      EDGAR_DATA_DIR: /data/edgar
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: sec_edgar_filings
      MONGO_FILING_METADATA_COLLECTION: filing_metadata
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: filings
      KAFKA_GROUP_ID: edgar-pgvector-etl
      KAFKA_AUTO_OFFSET_RESET: earliest
      KAFKA_SESSION_TIMEOUT_MS: "180000"
      ALLOWED_FORMS: 10-K,10-Q,10-K/A,10-Q/A,8-K,8-K/A
      HF_HOME: /cache/huggingface
    volumes:
      - ${EDGAR_HOST_PATH:-./sec-edgar/filings-data}:/data/edgar:ro
      - ${HF_CACHE_HOST_PATH:-./sec-edgar/hf-cache}:/cache/huggingface
      - ${CONFIG_HOST_PATH:-./config}:/app/config
    ports:
      - "18001:8001"
    command: ["edgar-etl", "standby", "--host", "0.0.0.0", "--port", "8001"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sec-edgar-filings-to-pgvector-search:
    profiles: ["pgvector"]
    image: sanjuthomas/sec-edgar-filings-to-pgvector:latest
    restart: unless-stopped
    cpus: 2
    mem_limit: 8g
    memswap_limit: 8g
    depends_on:
      pgvector-init:
        condition: service_completed_successfully
      pgvector:
        condition: service_healthy
    environment:
      <<: *embedding-env
      DATABASE_URL: postgresql://postgres:postgres@pgvector:5432/edgar
      HF_HOME: /cache/huggingface
    volumes:
      - ${HF_CACHE_HOST_PATH:-./sec-edgar/hf-cache}:/cache/huggingface
      - ${CONFIG_HOST_PATH:-./config}:/app/config
    ports:
      - "18000:8000"
    command: ["edgar-etl", "serve", "--host", "0.0.0.0", "--port", "8000"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- 3. Qdrant pipeline (DB, init, ETL standby, search — separate containers) ---

  qdrant:
    profiles: ["qdrant"]
    image: qdrant/qdrant:v1.18.2
    restart: unless-stopped
    depends_on:
      init-dirs:
        condition: service_completed_successfully
    ports:
      - "16333:6333"
      - "16334:6334"
    volumes:
      - ${QDRANT_HOST_PATH:-./sec-edgar/qdrant-data}:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333' || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  init-qdrant:
    profiles: ["qdrant"]
    image: sanjuthomas/sec-edgar-filings-to-qdrant:latest
    restart: "no"
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: filing_chunks
      EMBEDDING_MODEL: BAAI/bge-m3
      EMBEDDING_DIMENSION: 1024
    entrypoint: ["edgar-etl", "init-collection"]

  sec-edgar-filings-to-qdrant:
    profiles: ["qdrant"]
    image: sanjuthomas/sec-edgar-filings-to-qdrant:latest
    restart: unless-stopped
    cpus: 4
    mem_reservation: 2g
    mem_limit: 32g
    memswap_limit: 32g
    depends_on:
      init-qdrant:
        condition: service_completed_successfully
      init-kafka:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      <<: *embedding-env
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: filing_chunks
      EMBEDDING_DIMENSION: 1024
      EDGAR_DATA_DIR: /data/edgar
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: sec_edgar_filings
      MONGO_FILING_METADATA_COLLECTION: filing_metadata
      ALLOWED_FORMS: 10-K,10-Q,10-K/A,10-Q/A,8-K,8-K/A
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: filings
      KAFKA_GROUP_ID: edgar-qdrant-etl
      KAFKA_AUTO_OFFSET_RESET: earliest
      KAFKA_SESSION_TIMEOUT_MS: "180000"
      HF_HOME: /cache/huggingface
    volumes:
      - ${EDGAR_HOST_PATH:-./sec-edgar/filings-data}:/data/edgar:ro
      - ${HF_CACHE_HOST_PATH:-./sec-edgar/hf-cache}:/cache/huggingface
      - ${CONFIG_HOST_PATH:-./config}:/app/config
    ports:
      - "18003:8001"
    command: ["edgar-etl", "standby", "--host", "0.0.0.0", "--port", "8001"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sec-edgar-filings-to-qdrant-search:
    profiles: ["qdrant"]
    image: sanjuthomas/sec-edgar-filings-to-qdrant:latest
    restart: unless-stopped
    depends_on:
      init-qdrant:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
    environment:
      <<: *embedding-env
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: filing_chunks
      EMBEDDING_DIMENSION: 1024
      HF_HOME: /cache/huggingface
    volumes:
      - ${HF_CACHE_HOST_PATH:-./sec-edgar/hf-cache}:/cache/huggingface
      - ${CONFIG_HOST_PATH:-./config}:/app/config
    ports:
      - "18002:8000"
    command: ["edgar-etl", "serve", "--host", "0.0.0.0", "--port", "8000"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- 4. chat UI (pgvector or Qdrant in Docker; Ollama on host) ---

  sec-edgar-filings-chat:
    profiles: ["rag"]
    image: sanjuthomas/sec-edgar-filings-chat:latest
    restart: unless-stopped
    ports:
      - "18095:8095"
    environment:
      SERVER_PORT: "8095"
      PGUSER: postgres
      PGPASSWORD: postgres
      PG_HOST: pgvector
      PG_PORT: "5432"
      PG_DATABASE: edgar
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: filing_chunks
      QDRANT_DENSE_VECTOR: dense
      QDRANT_BM25_VECTOR: content-bm25
      QDRANT_BM25_MODEL: Qdrant/bm25
      DEFAULT_VECTOR_STORE: pgvector
      PGSEARCH_ENABLED: "true"
      QDRANTSEARCH_ENABLED: "true"
      SEARCH_TOP_K: "25"
      HYBRID_RETRIEVAL_TOP_K: "50"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      pgvector-init:
        condition: service_completed_successfully
      init-qdrant:
        condition: service_completed_successfully
      pgvector:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # --- 5. Kafka debug UI (optional) ---

  kafka-web-clients:
    profiles: ["debug"]
    image: sanjuthomas/kafka-web-clients:latest
    restart: unless-stopped
    ports:
      - "18081:8080"
    depends_on:
      kafka:
        condition: service_healthy
